<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Event Registration</title>

    <style>

        *{
            box-sizing: border-box;
        }

        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
        }

        .wrapper{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container{
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h1{
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
            color: #1e293b;
        }

        .form-group{
            margin-bottom: 20px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #334155;
        }

        input{
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #56595e;
            background: rgb(255, 255, 255);
            font-size: 15px;
            color: #1e293b;
            transition: 0.2s ease;
            outline: none;
        }

        input:focus{
            background: white;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .has-error input{
            border-color: #ef4444;
            background: #fef2f2;
            color: #b91c1c;
        }

        .has-error input:focus{
            border-color: #dc2626;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.12);
        }

        .error-text{
            margin-top: 6px;
            color: #dc2626;
            font-size: 13px;
            padding-left: 5px;
        }

        button{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover{
            background: #1d4ed8;
        }

    </style>

</head>
<body>

<div class="wrapper">
    <div class="container">
        <h1>Event Registration</h1>
        <form method="POST">

            {% csrf_token %}
            {% for field in form %}

                <div class="form-group {% if field.errors %}has-error{% endif %}">

                    <label for="{{ field.id_for_label }}">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% for error in field.errors %}
                        <div class="error-text">
                            {{ error }}
                        </div>
                    {% endfor %}

                </div>

            {% endfor %}

            <button type="submit">Register</button>
        </form>
    </div>
</div>

</body>
</html>
